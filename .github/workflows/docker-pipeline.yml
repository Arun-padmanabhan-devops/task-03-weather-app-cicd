name: Weather App CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: weather-app-cicd

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build Docker image with two tags
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.run_number }} .

      # Step 4: Push latest tag
      - name: Push Latest Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      # Step 5: Push build number tag
      - name: Push Build Number Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}

      # Step 6: Display success message
      - name: Pipeline Completed
        run: |
          echo "Docker image successfully built and pushed."
          echo "Latest Tag       : latest"
          echo "Build Number Tag : ${{ github.run_number }}"